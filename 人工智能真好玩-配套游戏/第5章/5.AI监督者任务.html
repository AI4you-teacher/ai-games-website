<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI监督者任务</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1c2740;
    --border: #2a3a5c;
    --text: #e2e8f8;
    --text2: #7a90bb;
    --accent: #38bdf8;
    --accent2: #fb923c;
    --danger: #f43f5e;
    --green: #34d399;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --card: #161f35;
    --glow-blue: 0 0 24px rgba(56,189,248,0.35);
    --glow-red: 0 0 24px rgba(244,63,94,0.35);
    --glow-green: 0 0 24px rgba(52,211,153,0.35);
    --radius: 18px;
    --shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .light {
    --bg: #f1f5fd;
    --surface: #ffffff;
    --surface2: #e8f0ff;
    --border: #c7d7f0;
    --text: #1e2a4a;
    --text2: #5a6e9c;
    --accent: #0284c7;
    --accent2: #ea580c;
    --danger: #e11d48;
    --green: #059669;
    --yellow: #d97706;
    --purple: #7c3aed;
    --card: #f0f5ff;
    --glow-blue: 0 0 20px rgba(2,132,199,0.2);
    --glow-red: 0 0 20px rgba(225,29,72,0.2);
    --glow-green: 0 0 20px rgba(5,150,105,0.2);
    --shadow: 0 8px 32px rgba(0,0,80,0.1);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Noto Sans SC',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    transition:background 0.4s, color 0.4s;
  }

  /* Dot matrix background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
    background-size:28px 28px;
    opacity:0.4;
    pointer-events:none; z-index:0;
  }

  .screen { display:none; position:relative; z-index:1; }
  .screen.active { display:block; }

  /* ===== HEADER ===== */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px;
    background:var(--surface);
    border-bottom:2px solid var(--border);
    box-shadow:var(--shadow);
    position:sticky; top:0; z-index:100;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .header-title {
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.3rem;
    color:var(--accent);
    display:flex; align-items:center; gap:8px;
  }
  .case-indicator {
    background:var(--card);
    border:2px solid var(--border);
    border-radius:10px;
    padding:4px 12px;
    font-size:0.82rem;
    color:var(--text2);
  }
  .header-right { display:flex; align-items:center; gap:12px; }
  .header-score {
    background:var(--card);
    border:2px solid var(--yellow);
    border-radius:10px;
    padding:4px 14px;
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1rem;
    color:var(--yellow);
  }
  .theme-btn {
    background:var(--surface2);
    border:2px solid var(--border);
    color:var(--text);
    width:38px; height:38px;
    border-radius:50%;
    font-size:1rem; cursor:pointer;
    transition:all 0.2s;
  }
  .theme-btn:hover { border-color:var(--accent); }

  /* ===== INTRO ===== */
  .intro-wrap {
    max-width:760px; margin:0 auto;
    padding:50px 24px; text-align:center;
  }
  .intro-badge-row {
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
    margin-bottom:24px;
  }
  .intro-badge {
    background:var(--card);
    border:2px solid var(--border);
    border-radius:20px;
    padding:5px 14px;
    font-size:0.82rem;
    color:var(--text2);
  }
  .intro-badge.hot { border-color:var(--danger); color:var(--danger); }
  .intro-icon-big { font-size:5.5rem; margin-bottom:16px; display:block;
    animation:shield-pulse 2s ease-in-out infinite; }
  @keyframes shield-pulse {
    0%,100%{transform:scale(1) rotate(-3deg)} 50%{transform:scale(1.08) rotate(3deg)}
  }
  .intro-title {
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:2.6rem; line-height:1.2;
    margin-bottom:14px;
    background:linear-gradient(135deg,var(--accent),var(--danger));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .intro-sub { font-size:1.05rem; color:var(--text2); line-height:1.7; max-width:540px; margin:0 auto 32px; }
  .scenario-preview {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:14px; margin-bottom:36px;
  }
  .scenario-card {
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    padding:16px 14px;
    text-align:left;
    transition:all 0.2s;
  }
  .scenario-card:hover { border-color:var(--accent); transform:translateY(-3px); }
  .sc-num { font-size:0.72rem; color:var(--text2); margin-bottom:6px; }
  .sc-icon { font-size:2rem; margin-bottom:8px; display:block; }
  .sc-name { font-weight:700; font-size:0.88rem; color:var(--text); }
  .start-btn {
    background:linear-gradient(135deg,var(--danger),var(--accent));
    color:#fff; border:none;
    padding:18px 52px;
    border-radius:50px;
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.4rem; cursor:pointer;
    box-shadow:var(--glow-red);
    transition:all 0.2s; letter-spacing:2px;
  }
  .start-btn:hover { transform:scale(1.06); box-shadow:0 0 40px rgba(244,63,94,0.6); }

  /* ===== GAME LAYOUT ===== */
  .game-wrap { max-width:900px; margin:0 auto; padding:24px; }

  /* Progress */
  .prog-row { display:flex; gap:8px; margin-bottom:24px; }
  .prog-step {
    flex:1; height:6px; border-radius:10px;
    background:var(--border); transition:background 0.4s;
  }
  .prog-step.done { background:var(--green); }
  .prog-step.current { background:var(--accent); box-shadow:var(--glow-blue); }

  /* Scene card */
  .scene-card {
    background:var(--surface);
    border:2px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:20px;
    box-shadow:var(--shadow);
    animation:slideIn 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes slideIn {
    from{transform:translateX(40px);opacity:0}
    to{transform:translateX(0);opacity:1}
  }
  .scene-header {
    padding:20px 24px;
    display:flex; align-items:flex-start; gap:16px;
    border-bottom:2px solid var(--border);
  }
  .scene-emoji { font-size:3rem; min-width:52px; }
  .scene-meta {}
  .scene-tag {
    display:inline-block;
    font-size:0.7rem; font-weight:700;
    padding:2px 10px; border-radius:20px;
    margin-bottom:6px; letter-spacing:1px;
  }
  .tag-bias { background:rgba(244,63,94,0.15); color:var(--danger); border:1px solid var(--danger); }
  .tag-error { background:rgba(251,146,60,0.15); color:var(--accent2); border:1px solid var(--accent2); }
  .tag-privacy { background:rgba(167,139,250,0.15); color:var(--purple); border:1px solid var(--purple); }
  .tag-abuse { background:rgba(251,191,36,0.15); color:var(--yellow); border:1px solid var(--yellow); }
  .scene-title {
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.4rem; color:var(--text); margin-bottom:6px;
  }
  .scene-desc {
    font-size:0.92rem; color:var(--text2); line-height:1.7;
  }

  /* AI behavior display */
  .ai-behavior {
    padding:20px 24px;
    background:var(--card);
    border-bottom:2px solid var(--border);
  }
  .behavior-label { font-size:0.78rem; color:var(--text2); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .behavior-bubbles { display:flex; flex-wrap:wrap; gap:8px; }
  .ai-bubble {
    background:var(--surface2);
    border:1.5px solid var(--border);
    border-radius:12px;
    padding:8px 14px;
    font-size:0.88rem;
    color:var(--text);
    display:flex; align-items:center; gap:6px;
    transition:all 0.2s;
  }
  .ai-bubble.problem { border-color:var(--danger); background:rgba(244,63,94,0.08); }
  .ai-bubble .bub-icon { font-size:1.1rem; }

  /* Question */
  .question-area { padding:20px 24px; }
  .q-title {
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.1rem; color:var(--text);
    margin-bottom:14px;
    display:flex; align-items:center; gap:8px;
  }
  .options-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:12px;
  }
  .option-btn {
    background:var(--card);
    border:2.5px solid var(--border);
    border-radius:14px;
    padding:16px;
    cursor:pointer;
    text-align:left;
    transition:all 0.2s;
    display:flex; align-items:flex-start; gap:10px;
  }
  .option-btn:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--glow-blue); }
  .option-btn.selected-correct {
    border-color:var(--green);
    background:rgba(52,211,153,0.08);
    box-shadow:var(--glow-green);
    transform:scale(1.02);
  }
  .option-btn.selected-wrong {
    border-color:var(--danger);
    background:rgba(244,63,94,0.08);
    box-shadow:var(--glow-red);
    animation:shake 0.4s ease;
  }
  .option-btn.show-correct { border-color:var(--green); background:rgba(52,211,153,0.06); }
  .option-btn.disabled { pointer-events:none; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)}
  }
  .opt-icon { font-size:1.5rem; min-width:30px; }
  .opt-text { font-size:0.9rem; color:var(--text); line-height:1.5; font-weight:500; }
  .opt-badge {
    font-size:0.68rem; margin-top:5px;
    padding:2px 8px; border-radius:8px;
    display:inline-block;
  }
  .opt-badge-correct { background:rgba(52,211,153,0.2); color:var(--green); }
  .opt-badge-wrong { background:rgba(244,63,94,0.2); color:var(--danger); }

  /* Feedback panel */
  .feedback-panel {
    margin:0 24px 20px;
    border-radius:14px;
    padding:18px 20px;
    display:none;
    animation:fadeSlide 0.4s ease;
  }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .feedback-panel.show { display:block; }
  .feedback-panel.correct-fb {
    background:rgba(52,211,153,0.08);
    border:2px solid var(--green);
  }
  .feedback-panel.wrong-fb {
    background:rgba(244,63,94,0.08);
    border:2px solid var(--danger);
  }
  .fb-head {
    display:flex; align-items:center; gap:10px;
    margin-bottom:10px;
  }
  .fb-result-icon { font-size:1.6rem; }
  .fb-result-title {
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.1rem;
  }
  .correct-fb .fb-result-title { color:var(--green); }
  .wrong-fb .fb-result-title { color:var(--danger); }
  .fb-explain { font-size:0.9rem; color:var(--text2); line-height:1.7; }
  .fb-teacher {
    background:rgba(167,139,250,0.08);
    border-left:3px solid var(--purple);
    padding:10px 14px;
    border-radius:0 10px 10px 0;
    margin-top:12px;
    font-size:0.88rem; color:var(--text2); line-height:1.6;
  }
  .fb-teacher-name { color:var(--purple); font-weight:700; font-size:0.78rem; margin-bottom:4px; }

  .next-btn {
    display:block; width:calc(100% - 48px);
    margin:0 24px 24px;
    padding:15px;
    background:linear-gradient(135deg,var(--accent),var(--purple));
    color:#fff; border:none;
    border-radius:12px;
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.1rem; cursor:pointer;
    transition:all 0.2s; letter-spacing:1px;
    display:none;
  }
  .next-btn.show { display:block; }
  .next-btn:hover { transform:scale(1.02); box-shadow:var(--glow-blue); }

  /* Combo meter (danger gauge) */
  .danger-meter {
    padding:0 24px 20px;
  }
  .dm-label { font-size:0.78rem; color:var(--text2); margin-bottom:6px; display:flex; justify-content:space-between; }
  .dm-bar { height:10px; background:var(--border); border-radius:10px; overflow:hidden; }
  .dm-fill {
    height:100%;
    border-radius:10px;
    transition:width 0.6s ease, background 0.4s;
    background:linear-gradient(90deg,var(--green),var(--yellow),var(--danger));
  }

  /* Final screen */
  .final-wrap {
    max-width:640px; margin:0 auto;
    padding:50px 24px; text-align:center;
  }
  .final-icon { font-size:5rem; margin-bottom:16px; display:block; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .final-title {
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:2.4rem;
    background:linear-gradient(135deg,var(--green),var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:14px;
  }
  .final-stats {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:14px; margin:24px 0;
  }
  .stat-box {
    background:var(--card);
    border:2px solid var(--border);
    border-radius:14px;
    padding:18px;
    text-align:center;
  }
  .stat-val {
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:2.2rem;
    display:block; margin-bottom:4px;
  }
  .stat-label { font-size:0.78rem; color:var(--text2); }
  .rank-box {
    background:var(--card);
    border:3px solid var(--yellow);
    border-radius:var(--radius);
    padding:24px;
    margin:20px 0;
    box-shadow:0 0 30px rgba(251,191,36,0.2);
  }
  .rank-title { font-family:'ZCOOL KuaiLe',cursive; font-size:1.1rem; color:var(--text2); margin-bottom:8px; }
  .rank-name {
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.8rem; color:var(--yellow);
  }
  .teacher-final {
    background:rgba(56,189,248,0.06);
    border:2px solid var(--accent);
    border-radius:var(--radius);
    padding:20px;
    text-align:left;
    margin:20px 0;
  }
  .tf-name { color:var(--accent); font-weight:700; font-size:0.82rem; margin-bottom:8px; }
  .tf-text { font-size:0.92rem; color:var(--text2); line-height:1.7; }
  .restart-btn {
    background:linear-gradient(135deg,var(--danger),var(--accent2));
    color:#fff; border:none;
    padding:16px 48px;
    border-radius:50px;
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.2rem; cursor:pointer;
    transition:all 0.2s; letter-spacing:2px;
    box-shadow:var(--glow-red);
  }
  .restart-btn:hover { transform:scale(1.05); }

  /* Particle */
  .particle {
    position:fixed; pointer-events:none; z-index:250;
    font-size:1.4rem;
    animation:pfloat 1.8s ease-out forwards;
  }
  @keyframes pfloat {
    0%{transform:translateY(0) scale(1) rotate(0); opacity:1}
    100%{transform:translateY(-160px) scale(0.3) rotate(540deg); opacity:0}
  }

  /* Points float */
  .pts-float {
    position:fixed; pointer-events:none; z-index:260;
    font-family:'ZCOOL KuaiLe',cursive;
    font-size:1.6rem;
    animation:ptsfloat 1s ease-out forwards;
  }
  @keyframes ptsfloat {
    0%{transform:translateY(0);opacity:1}
    100%{transform:translateY(-70px);opacity:0}
  }
</style>
</head>
<body>

<!-- INTRO SCREEN -->
<div class="screen active" id="screen-intro">
  <div class="header">
    <div class="header-title">🛡️ AI监督者任务</div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="intro-wrap">
    <div class="intro-badge-row">
      <span class="intro-badge">🎮 5个真实场景</span>
      <span class="intro-badge hot">🔥 AI风险识别</span>
      <span class="intro-badge">⏱️ 约8分钟</span>
    </div>
    <span class="intro-icon-big">🕵️</span>
    <h1 class="intro-title">成为AI世界的守护者！</h1>
    <p class="intro-sub">AI很厉害，但AI也会犯错！偏见、误判、滥用……谁来监督AI呢？就是你！今天你将扮演一名AI监督官，识别AI的问题，选择正确的应对方案，保护真实的人不受伤害。</p>

    <div class="scenario-preview">
      <div class="scenario-card">
        <span class="sc-num">案例 01</span>
        <span class="sc-icon">🛒</span>
        <div class="sc-name">推荐系统偏见</div>
      </div>
      <div class="scenario-card">
        <span class="sc-num">案例 02</span>
        <span class="sc-icon">🚗</span>
        <div class="sc-name">自动驾驶误判</div>
      </div>
      <div class="scenario-card">
        <span class="sc-num">案例 03</span>
        <span class="sc-icon">🏥</span>
        <div class="sc-name">医疗AI漏判</div>
      </div>
      <div class="scenario-card">
        <span class="sc-num">案例 04</span>
        <span class="sc-icon">📸</span>
        <div class="sc-name">换脸AI滥用</div>
      </div>
      <div class="scenario-card">
        <span class="sc-num">案例 05</span>
        <span class="sc-icon">🎓</span>
        <div class="sc-name">AI判卷不公平</div>
      </div>
    </div>

    <button class="start-btn" onclick="startGame()">🕵️ 接受任务！</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screen-game">
  <div class="header">
    <div class="header-left">
      <div class="header-title">🛡️ AI监督者任务</div>
      <div class="case-indicator" id="case-indicator">案例 1/5</div>
    </div>
    <div class="header-right">
      <div class="header-score" id="header-score">⭐ 0</div>
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
  </div>

  <div class="game-wrap">
    <div class="prog-row" id="prog-row"></div>
    <div id="scene-container"></div>
  </div>
</div>

<!-- FINAL SCREEN -->
<div class="screen" id="screen-final">
  <div class="header">
    <div class="header-title">🛡️ AI监督者任务</div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="final-wrap" id="final-content"></div>
</div>

<script>
// ============ DATA ============
const scenarios = [
  {
    id: 1,
    emoji: '🛒',
    tagClass: 'tag-bias',
    tagText: '推荐偏见',
    title: '购物AI只推同一类商品？',
    desc: '乐乐发现，自己在购物APP上买了一次运动鞋后，之后所有推荐都是运动鞋——再也没出现过书包、文具等其他商品。她错过了很多可能需要的东西。',
    behaviors: [
      { icon: '👟', text: '买运动鞋→推运动鞋×100次', isProblem: true },
      { icon: '📚', text: '从不推荐其他品类', isProblem: true },
      { icon: '🔄', text: '数据更新极慢', isProblem: false },
    ],
    question: '作为AI监督者，你应该怎么做？',
    options: [
      { icon:'🗑️', text:'直接删掉这个APP，AI不可信', badge:null, correct:false, why:'这样解决不了问题，换一个APP可能遇到同样情况。' },
      { icon:'🔍', text:'检查推荐算法是否过度依赖单一行为数据', badge:'✅ 专业做法', correct:true, why:'正确！监督AI要找到根本原因——算法只看"最近购买"而忽略了多样性。这叫"过滤气泡"问题。' },
      { icon:'😤', text:'投诉商家，要求赔偿', badge:null, correct:false, why:'这是个技术问题而非商家主动欺骗，方向不对。' },
      { icon:'🤷', text:'没关系，AI总是对的', badge:null, correct:false, why:'AI并不总是对的！这正是为什么需要人来监督AI。' },
    ],
    explain: '这是"过滤气泡"（Filter Bubble）问题：推荐算法把你关在自己的偏好泡泡里，越来越窄。解决方法是让算法加入"多样性探索"——不只推你已喜欢的，也偶尔推荐新类别。',

const ranks = [
  { min:0, max:200, name:'AI观察员', emoji:'👀', desc:'你开始意识到AI不总是对的，继续深入！' },
  { min:200, max:350, name:'问题识别者', emoji:'🔍', desc:'你能发现AI的主要问题，还需要更精准的判断！' },
  { min:350, max:460, name:'AI监督官', emoji:'🛡️', desc:'你掌握了核心监督技巧，很厉害！' },
  { min:460, max:500, name:'算法正义守护者', emoji:'⚖️', desc:'满分英雄！你是AI时代最需要的那种人！' },
];

// ============ STATE ============
let currentCase = 0;
let score = 0;
let correctCount = 0;
let answered = false;
let theme = 'light';

// ============ UTILS ============
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.body.classList.toggle('light');
  document.querySelectorAll('.theme-btn').forEach(b => b.textContent = theme === 'dark' ? '🌙' : '☀️');
}

// 初始化默认日间模式
document.addEventListener('DOMContentLoaded', () => {
  document.body.classList.add('light');
  document.querySelectorAll('.theme-btn').forEach(b => b.textContent = '☀️');
});

// Fisher-Yates 洗牌算法
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startGame() {
  // 每个题目加载时随机打乱选项顺序
  scenarios.forEach(scenario => {
    scenario.options = shuffleArray(scenario.options);
  });
  
  document.getElementById('screen-intro').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  renderProgress();
  renderCase(currentCase);
}

function renderProgress() {
  const row = document.getElementById('prog-row');
  row.innerHTML = scenarios.map((_, i) => {
    let cls = 'prog-step';
    if (i < currentCase) cls += ' done';
    else if (i === currentCase) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('case-indicator').textContent = `案例 ${currentCase+1}/${scenarios.length}`;
}

function renderCase(idx) {
  answered = false;
  const s = scenarios[idx];
  const container = document.getElementById('scene-container');

  container.innerHTML = `
    <div class="scene-card">
      <div class="scene-header">
        <div class="scene-emoji">${s.emoji}</div>
        <div class="scene-meta">
          <span class="scene-tag ${s.tagClass}">${s.tagText}</span>
          <div class="scene-title">${s.title}</div>
          <div class="scene-desc">${s.desc}</div>
        </div>
      </div>

      <div class="ai-behavior">
        <div class="behavior-label">⚠️ AI的行为表现（红色 = 问题行为）：</div>
        <div class="behavior-bubbles">
          ${s.behaviors.map(b => `
            <div class="ai-bubble ${b.isProblem ? 'problem' : ''}">
              <span class="bub-icon">${b.icon}</span>
              <span>${b.text}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="danger-meter">
        <div class="dm-label"><span>危险等级</span><span>${s.dangerLevel}%</span></div>
        <div class="dm-bar">
          <div class="dm-fill" id="dm-fill-${idx}" style="width:0%"></div>
        </div>
      </div>

      <div class="question-area">
        <div class="q-title">🕵️ 你的监督决定是？</div>
        <div class="options-grid" id="options-grid">
          ${s.options.map((o, oi) => `
            <button class="option-btn" onclick="selectOption(${oi})" data-idx="${oi}">
              <span class="opt-icon">${o.icon}</span>
                <div>
                  <div class="opt-text">${o.text}</div>
                </div>
            </button>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="feedback-panel" id="feedback-panel"></div>
    <button class="next-btn" id="next-btn" onclick="nextCase()">
      ${idx < scenarios.length - 1 ? '下一个案例 ➡️' : '查看最终评级 🏆'}
    </button>
  `;

  // Animate danger bar
  setTimeout(() => {
    const fill = document.getElementById(`dm-fill-${idx}`);
    if (fill) fill.style.width = s.dangerLevel + '%';
  }, 200);
}

function selectOption(optIdx) {
  if (answered) return;
  answered = true;

  const s = scenarios[currentCase];
  const opt = s.options[optIdx];
  const grid = document.getElementById('options-grid');
  const btns = grid.querySelectorAll('.option-btn');

  // Style all buttons
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (s.options[i].correct) btn.classList.add('show-correct');
  });
  btns[optIdx].classList.add(opt.correct ? 'selected-correct' : 'selected-wrong');

  // Score
  let pts = 0;
  if (opt.correct) {
    pts = 100;
    correctCount++;
    spawnParticles(opt.correct);
  } else {
    pts = 20; // partial for trying
  }
  score += pts;
  document.getElementById('header-score').textContent = `⭐ ${score}`;

  if (pts > 20) showPtsFloat(pts);

  // Feedback
  const fb = document.getElementById('feedback-panel');
  fb.className = `feedback-panel show ${opt.correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = `
    <div class="fb-head">
      <span class="fb-result-icon">${opt.correct ? '✅' : '❌'}</span>
      <span class="fb-result-title">${opt.correct ? '判断正确！+100分 🎉' : '不是最优解...'}</span>
    </div>
    <div class="fb-explain">${opt.why}</div>
    <div class="fb-explain" style="margin-top:10px">${s.explain}</div>
    <div class="fb-teacher">
      <div class="fb-teacher-name">🎓 AI小智老师说：</div>
      ${s.teacher}
    </div>
  `;

  document.getElementById('next-btn').classList.add('show');
}

function nextCase() {
  currentCase++;
  if (currentCase >= scenarios.length) {
    showFinal();
    return;
  }
  renderProgress();
  renderCase(currentCase);
  window.scrollTo({top:0, behavior:'smooth'});
}

function showFinal() {
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-final').classList.add('active');

  const pct = Math.round((correctCount / scenarios.length) * 100);
  const rank = ranks.find(r => score >= r.min && score < r.max) || ranks[ranks.length-1];

  spawnParticles(true, 20);

  document.getElementById('final-content').innerHTML = `
    <span class="final-icon">${rank.emoji}</span>
    <h1 class="final-title">任务完成！</h1>

    <div class="final-stats">
      <div class="stat-box">
        <span class="stat-val" style="color:var(--accent)">${score}</span>
        <div class="stat-label">总积分</div>
      </div>
      <div class="stat-box">
        <span class="stat-val" style="color:var(--green)">${correctCount}/${scenarios.length}</span>
        <div class="stat-label">正确判断</div>
      </div>
      <div class="stat-box">
        <span class="stat-val" style="color:var(--yellow)">${pct}%</span>
        <div class="stat-label">准确率</div>
      </div>
    </div>

    <div class="rank-box">
      <div class="rank-title">你获得了称号</div>
      <div class="rank-name">${rank.emoji} ${rank.name}</div>
      <div style="font-size:0.9rem;color:var(--text2);margin-top:8px">${rank.desc}</div>
    </div>

    <div class="teacher-final">
      <div class="tf-name">🎓 AI小智老师的结业寄语：</div>
      <div class="tf-text">
        今天你扮演了"AI监督者"，这不是游戏里才有的角色——在真实世界里，工程师、政策制定者、普通用户都可以是AI的监督者。<br><br>
        最重要的三个问题：<br>
        1️⃣ 这个AI对所有人都公平吗？<br>
        2️⃣ 这个AI的决定可以被解释和检查吗？<br>
        3️⃣ 出了问题，谁来负责？<br><br>
        带着这三个问题去看待生活中的每一个AI，你就已经是真正的AI监督者了！
      </div>
    </div>

    <button class="restart-btn" onclick="restartGame()">🔄 再来一次</button>
  `;
}

function restartGame() {
  currentCase = 0;
  score = 0;
  correctCount = 0;
  answered = false;
  document.getElementById('screen-final').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  document.getElementById('header-score').textContent = '⭐ 0';
  renderProgress();
  renderCase(0);
}

function spawnParticles(isCorrect, count = 10) {
  const emojis = isCorrect
    ? ['✅','⭐','🎉','💡','🛡️','✨','🔍']
    : ['💭','🤔'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.top = '30%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1800);
    }, i * 60);
  }
}

function showPtsFloat(pts) {
  const el = document.createElement('div');
  el.className = 'pts-float';
  el.textContent = `+${pts} ⭐`;
  el.style.color = 'var(--yellow)';
  el.style.left = '60%';
  el.style.top = '40%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}
</script>
