<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 应用连连看 ✦ 博物馆版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap');
:root {
  --ink: #1a1a2e;
  --card: #16213e;
  --panel: #0f3460;
  --accent: #e94560;
  --gold: #f5a623;
  --teal: #00b4d8;
  --green: #06d6a0;
  --text: #edf2f4;
  --muted: #8d99ae;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--ink);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
  position: relative;
}
/* ── 星星背景 ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 20% 50%, rgba(233,69,96,.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(0,180,216,.08) 0%, transparent 60%);
  pointer-events: none;
}

/* ══ 浮动粒子 ══ */
.particle {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  animation: particleFly 0.8s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}

/* ══ 浮动得分 ══ */
.float-score {
  position: fixed;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 28px;
  font-weight: bold;
  pointer-events: none;
  z-index: 9998;
  animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
}

/* ══ 屏幕闪光 ══ */
.screen-flash {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9997;
  animation: flash 0.3s ease-out forwards;
}
@keyframes flash {
  0% { opacity: 0.25; }
  100% { opacity: 0; }
}

/* ══ 新手引导 ══ */
#onboarding {
  max-width: 500px; width: 100%;
  background: var(--card);
  border: 1px solid rgba(0,180,216,0.3);
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: 0 0 60px rgba(0,180,216,0.12), 0 20px 40px rgba(0,0,0,0.4);
  animation: slideIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  z-index: 10;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.ob-badge {
  display: inline-block;
  background: var(--accent);
  color: white;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 16px;
}
.ob-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 32px;
  color: var(--teal);
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(0,180,216,0.4);
}
.ob-subtitle {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.6;
}
.ob-steps {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
}
.ob-step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  border-left: 3px solid var(--teal);
  transition: background 0.2s;
}
.ob-step:hover { background: rgba(0,180,216,0.08); }
.ob-step-icon {
  font-size: 24px;
  flex-shrink: 0;
  margin-top: 2px;
}
.ob-step-text { font-size: 14px; line-height: 1.5; color: var(--text); }
.ob-step-text strong { color: var(--gold); }
.btn-start {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), #c9184a);
  border: none;
  border-radius: 12px;
  color: white;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 20px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(233,69,96,0.4);
}
.btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(233,69,96,0.5); }
.btn-start:active { transform: translateY(0); }

/* ══ 游戏界面 ══ */
#game-screen { display: none; width: 100%; max-width: 860px; z-index: 10; position: relative; }

/* 顶部状态栏 */
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 14px 20px;
  background: var(--card);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
}
.hud-item { text-align: center; }
.hud-value {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 28px;
  color: var(--gold);
  transition: transform 0.2s;
}
.hud-value.pop { animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.5); }
  100% { transform: scale(1); }
}
.hud-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

/* 进度条 */
.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--green));
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 10px var(--teal);
}

/* 提示文字 */
#status-msg {
  text-align: center;
  height: 28px;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  transition: all 0.3s;
}

/* 棋盘 */
.board {
  display: flex;
  gap: 24px;
  justify-content: center;
}
.col { display: flex; flex-direction: column; gap: 12px; flex: 1; }

.card-item {
  padding: 16px 18px;
  background: var(--card);
  border: 2px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  line-height: 1.4;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
  user-select: none;
}
.card-item::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255,255,255,0.03));
  border-radius: 12px;
}
.card-item:hover:not(.matched):not(.wrong) {
  border-color: var(--teal);
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 15px rgba(0,180,216,0.2);
}
.card-item.selected {
  border-color: var(--gold);
  background: rgba(245,166,35,0.1);
  transform: translateY(-4px) scale(1.03);
  box-shadow: 0 0 20px rgba(245,166,35,0.3);
}
.card-item.matched {
  border-color: var(--green);
  background: rgba(6,214,160,0.08);
  opacity: 0.65;
  cursor: default;
  transform: none;
  animation: matchPulse 0.4s ease-out;
}
@keyframes matchPulse {
  0% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
.card-item.wrong {
  border-color: var(--accent);
  animation: shake 0.4s ease-out;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px) rotate(-1deg); }
  40% { transform: translateX(8px) rotate(1deg); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.card-number {
  position: absolute;
  top: 6px; right: 8px;
  font-size: 11px;
  color: var(--muted);
  font-weight: 700;
}
.matched-icon {
  position: absolute;
  right: 10px; top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  animation: checkIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes checkIn {
  from { transform: translateY(-50%) scale(0) rotate(-20deg); }
  to { transform: translateY(-50%) scale(1) rotate(0); }
}

/* ══ 结算界面 ══ */
#end-screen {
  display: none;
  max-width: 480px; width: 100%;
  background: var(--card);
  border: 1px solid rgba(6,214,160,0.3);
  border-radius: 20px;
  padding: 40px 32px;
  text-align: center;
  box-shadow: 0 0 60px rgba(6,214,160,0.15);
  animation: slideIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  z-index: 10;
}
.end-emoji { font-size: 64px; margin-bottom: 16px; animation: bounce 1s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.end-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 30px;
  color: var(--green);
  margin-bottom: 8px;
}
.end-score {
  font-size: 48px;
  font-family: 'ZCOOL KuaiLe', cursive;
  color: var(--gold);
  margin: 16px 0;
  text-shadow: 0 0 20px rgba(245,166,35,0.4);
}
.knowledge-card {
  background: rgba(0,180,216,0.06);
  border-left: 4px solid var(--teal);
  border-radius: 0 12px 12px 0;
  padding: 16px 18px;
  text-align: left;
  margin: 20px 0;
  font-size: 14px;
  line-height: 1.7;
  color: var(--muted);
}
.knowledge-card strong { color: var(--teal); }
.btn-replay {
  margin-top: 8px;
  padding: 14px 36px;
  background: linear-gradient(135deg, var(--teal), #0096c7);
  border: none;
  border-radius: 12px;
  color: white;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 18px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(0,180,216,0.3);
}
.btn-replay:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,180,216,0.4); }

.theme-toggle {
  position: absolute;
  top: 18px;
  right: 18px;
  z-index: 1000;
  border: 1px solid rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border-radius: 999px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}
.theme-toggle:hover { background: rgba(255,255,255,0.16); }

/* ══ 日间模式修复与完善 ══ */
body.day-mode {
  background-color: #f5f7ff;
  color: #1f2a44;
}
body.day-mode::before {
  background: radial-gradient(ellipse at 20% 50%, rgba(74, 140, 255, 0.05) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(74, 140, 255, 0.05) 0%, transparent 60%);
}
body.day-mode .theme-toggle {
  background: rgba(15,23,42,0.08);
  color: #1f2a44;
  border-color: rgba(15,23,42,0.15);
}
body.day-mode #onboarding, 
body.day-mode #end-screen,
body.day-mode .hud { 
  background: #ffffff; 
  border-color: rgba(74, 140, 255, 0.16); 
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}
body.day-mode .hud-label { color: #64748b; }
body.day-mode #status-msg { color: #1f2a44; }
body.day-mode .card-item { background: #f8fbff; border-color: rgba(74, 140, 255, 0.18); color: #1f2a44; }
body.day-mode .card-item::before { background: linear-gradient(135deg, transparent, rgba(0,0,0,0.02)); }
body.day-mode .card-number { color: #64748b; }
body.day-mode .matched-icon { color: #0b7545; }
body.day-mode .knowledge-card { background: #e7f4ff; border-color: rgba(74, 140, 255, 0.16); color: #1f2a44; }
body.day-mode .btn-replay { box-shadow: 0 4px 20px rgba(0,180,216,0.2); }
body.day-mode .ob-step { background: rgba(0,0,0,0.02); }
body.day-mode .ob-step-text { color: #1f2a44; }
body.day-mode .ob-subtitle { color: #4a5568; }
</style>
</head>
<body class="day-mode">
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 夜间</button>

<div id="onboarding">
  <div class="ob-badge">AI 在我身边</div>
  <div class="ob-title">🏛️ AI 应用博物馆</div>
  <div class="ob-subtitle">你是今天的导览志愿者！展品标签不小心打乱了，<br>请把每件 AI 应用和它的功能说明重新配对。</div>
  <div class="ob-steps">
    <div class="ob-step">
      <div class="ob-step-icon">👈</div>
      <div class="ob-step-text">点击<strong>左侧 AI 应用名称</strong>，它会变成金色高亮</div>
    </div>
    <div class="ob-step">
      <div class="ob-step-icon">👉</div>
      <div class="ob-step-text">再点击<strong>右侧对应的功能描述</strong>完成配对</div>
    </div>
    <div class="ob-step">
      <div class="ob-step-icon">⚡</div>
      <div class="ob-step-text">全部配对成功即可通关！配对越快，<strong>得分越高</strong></div>
    </div>
  </div>
  <button class="btn-start" onclick="startGame()">进入博物馆 →</button>
</div>

<div id="game-screen">
  <div class="hud">
    <div class="hud-item">
      <div class="hud-value" id="score-display">0</div>
      <div class="hud-label">得 分</div>
    </div>
    <div class="hud-item" style="flex:1; padding: 0 20px;">
      <div class="hud-label" style="margin-bottom:6px;">配对进度</div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="hud-item">
      <div class="hud-value" id="timer-display">0</div>
      <div class="hud-label">秒</div>
    </div>
  </div>
  <div id="status-msg">👆 请先选择一个 AI 应用</div>
  <div class="board">
    <div class="col" id="left-col"></div>
    <div class="col" id="right-col"></div>
  </div>
</div>

<div id="end-screen">
  <div class="end-emoji" id="end-emoji">🎉</div>
  <div class="end-title">全部配对成功！</div>
  <div style="color:var(--muted); font-size:14px;">你的最终得分</div>
  <div class="end-score" id="final-score">0</div>
  <div class="knowledge-card">
    <strong>🤖 小智老师说：</strong><br>
    AI 并非遥不可及的科幻机器，它已化身各种「隐形助手」融入日常。语音助手靠<strong>自然语言处理</strong>，推荐算法靠<strong>协同过滤</strong>，人脸识别靠<strong>卷积神经网络</strong>……每一个背后都是对大量数据的深度学习！
  </div>
  <button class="btn-replay" onclick="location.reload()">再来一局</button>
</div>

<script>
const pairs = [
  { id:1, app:"🎙️ 语音助手",  desc:"听懂你说的话，帮你设闹钟、播放音乐" },
  { id:2, app:"📱 推荐算法",  desc:"根据你的喜好，精准推送你可能喜欢的短视频" },
  { id:3, app:"🚗 无人驾驶",  desc:"用传感器感知路况，自动识别红绿灯和行人" },
  { id:4, app:"🌐 机器翻译",  desc:"实时把一种语言转化为另一种语言" },
  { id:5, app:"👤 人脸识别",  desc:"扫描面部特征，瞬间解锁你的手机屏幕" }
];

let selectedLeft = null, selectedRight = null;
let matchedCount = 0, score = 0;
let startTime, timerInterval;
const POINTS_PER_MATCH = 100;
const TIME_BONUS_MAX = 50;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startGame() {
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  buildBoard();
  startTime = Date.now();
  timerInterval = setInterval(() => {
    document.getElementById('timer-display').textContent = Math.floor((Date.now()-startTime)/1000);
  }, 500);
}

function buildBoard() {
  const lc = document.getElementById('left-col');
  const rc = document.getElementById('right-col');
  lc.innerHTML = rc.innerHTML = '';
  shuffle(pairs).forEach((p,i) => {
    lc.appendChild(makeCard(p.id, p.app, 'L', i+1));
  });
  shuffle(pairs).forEach((p,i) => {
    rc.appendChild(makeCard(p.id, p.desc, 'R', i+1));
  });
}

function makeCard(id, text, side, num) {
  const el = document.createElement('div');
  el.className = 'card-item';
  el.dataset.id = id;
  el.dataset.side = side;
  el.innerHTML = `<span class="card-number">${num}</span>${text}`;
  el.onclick = () => handleClick(el);
  return el;
}

function handleClick(el) {
  if (el.classList.contains('matched')) return;
  const side = el.dataset.side;
  
  // 取消同侧旧选中
  document.querySelectorAll(`.card-item[data-side="${side}"].selected`)
    .forEach(c => c.classList.remove('selected'));
  
  el.classList.add('selected');
  if (side === 'L') selectedLeft = el;
  else selectedRight = el;
  
  if (selectedLeft && selectedRight) {
    checkMatch();
  } else {
    setStatus('⚡ 再选另一侧的描述', 'var(--gold)');
  }
}

function checkMatch() {
  const idL = selectedLeft.dataset.id;
  const idR = selectedRight.dataset.id;
  
  if (idL === idR) {
    // 成功
    [selectedLeft, selectedRight].forEach(el => {
      el.classList.remove('selected');
      el.classList.add('matched');
      el.innerHTML += `<span class="matched-icon">✅</span>`;
      el.style.pointerEvents = 'none';
    });
    
    const elapsed = (Date.now()-startTime)/1000;
    const timeBonus = Math.max(0, Math.floor(TIME_BONUS_MAX - elapsed*2));
    const pts = POINTS_PER_MATCH + timeBonus;
    score += pts;
    matchedCount++;
    
    addScreenFlash('rgba(6,214,160,0.12)');
    spawnParticles(selectedRight, '#06d6a0');
    spawnFloatScore(selectedRight, `+${pts}`);
    updateHUD();
    setStatus('✅ 配对成功！', 'var(--green)');
    
    if (matchedCount === pairs.length) {
      setTimeout(endGame, 700);
    } else {
      selectedLeft = selectedRight = null;
    }
  } else {
    // 失败
    [selectedLeft, selectedRight].forEach(el => {
      el.classList.add('wrong');
      setTimeout(() => el.classList.remove('wrong', 'selected'), 600);
    });
    addScreenFlash('rgba(233,69,96,0.08)');
    score = Math.max(0, score - 20);
    updateHUD();
    setStatus('❌ 不对哦，再想想！', 'var(--accent)');
    setTimeout(() => { selectedLeft = selectedRight = null; }, 650);
  }
}

function setStatus(msg, color) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.color = color;
}

function updateHUD() {
  const sd = document.getElementById('score-display');
  sd.textContent = score;
  sd.classList.remove('pop');
  void sd.offsetWidth;
  sd.classList.add('pop');
  document.getElementById('prog-fill').style.width = (matchedCount/pairs.length*100) + '%';
}

function endGame() {
  clearInterval(timerInterval);
  document.getElementById('game-screen').style.display = 'none';
  const es = document.getElementById('end-screen');
  es.style.display = 'block';
  document.getElementById('final-score').textContent = score;
  if (score >= 500) { document.getElementById('end-emoji').textContent = '🏆'; }
  else if (score >= 350) { document.getElementById('end-emoji').textContent = '🎉'; }
  else { document.getElementById('end-emoji').textContent = '👍'; }
  // 撒彩花
  for (let i = 0; i < 20; i++) {
    setTimeout(() => spawnParticlesCenter(['#06d6a0','#f5a623','#e94560','#00b4d8'][i%4]), i*60);
  }
}

function spawnParticles(el, color) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i/8)*Math.PI*2;
    const dist = 40 + Math.random()*40;
    p.style.cssText = `left:${cx}px;top:${cy}px;background:${color};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function spawnParticlesCenter(color) {
  const cx = window.innerWidth/2, cy = window.innerHeight/2;
  for (let i = 0; i < 4; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random()*Math.PI*2;
    const dist = 80 + Math.random()*120;
    p.style.cssText = `left:${cx}px;top:${cy}px;width:8px;height:8px;background:${color};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist - 100}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function toggleTheme() {
  const body = document.body;
  const isDay = body.classList.toggle('day-mode');
  document.getElementById('themeToggle').textContent = isDay ? '🌙 夜间' : '☀️ 日间';
}

function spawnFloatScore(el, text) {
  const rect = el.getBoundingClientRect();
  const fs = document.createElement('div');
  fs.className = 'float-score';
  fs.textContent = text;
  fs.style.cssText = `left:${rect.left+rect.width/2-20}px;top:${rect.top}px;color:var(--gold);`;
  document.body.appendChild(fs);
  setTimeout(() => fs.remove(), 1100);
}

function addScreenFlash(color) {
  const sf = document.createElement('div');
  sf.className = 'screen-flash';
  sf.style.background = color;
  document.body.appendChild(sf);
  setTimeout(() => sf.remove(), 400);
}
</script>
</body>
</html>
